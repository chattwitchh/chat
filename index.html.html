<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: transparent; /* Прозрачный фон */
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        #container {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100vh;
            align-items: center;
            padding-bottom: 30px;
        }
        #box {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            max-width: 85%;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .ru { font-size: 18px; color: #bbb; margin-bottom: 5px; font-style: italic; }
        .en { font-size: 32px; color: #00ffcc; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        #status { color: red; font-size: 20px; position: fixed; top: 10px; left: 10px; }
    </style>
</head>
<body>
    <div id="status"></div>
    <div id="container">
        <div id="box">
            <div id="ru" class="ru">Ожидание звука...</div>
            <div id="en" class="en">Listening to Quddix...</div>
        </div>
    </div>

    <script>
        const ruBox = document.getElementById('ru');
        const enBox = document.getElementById('en');
        const status = document.getElementById('status');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            status.innerText = "ОШИБКА: OBS не поддерживает Speech API. См. инструкцию ниже!";
        }

        const rec = new SpeechRecognition();
        rec.lang = 'ru-RU';
        rec.continuous = true;
        rec.interimResults = true;

        rec.onresult = async (event) => {
            let final = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) final = event.results[i][0].transcript;
            }
            
            if (final) {
                ruBox.innerText = final;
                // Перевод
                try {
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(final)}&langpair=ru|en`);
                    const data = await res.json();
                    enBox.innerText = data.responseData.translatedText;
                } catch (e) { console.error(e); }
            }
        };

        rec.onerror = (e) => {
            if (e.error === 'not-allowed') {
                status.innerText = "НУЖЕН КЛИК: Нажми 'Взаимодействовать' и кликни здесь!";
            }
        };

        rec.onend = () => rec.start();
        
        // Запуск при клике (через 'Взаимодействовать' в OBS)
        document.body.onclick = () => {
            rec.start();
            status.innerText = "";
        };
    </script>
</body>
</html>
