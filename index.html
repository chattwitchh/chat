<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>QUDDIX Chat Overlay</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- НАСТРОЙКИ ДИЗАЙНА --- */
        :root {
            --main-font: 'Montserrat', sans-serif;
            --msg-bg: rgba(20, 20, 35, 0.75); /* Темный фон сообщений (полупрозрачный) */
            --accent-color: #a970ff; /* Фиолетовый Twitch */
            --text-color: #ffffff;
            --anim-speed: 0.4s;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Скрываем полосы прокрутки */
            background-color: transparent; /* Важно для OBS */
            font-family: var(--main-font);
        }

        #chat_container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Сообщения появляются снизу */
            padding: 20px;
            box-sizing: border-box;
            gap: 12px; /* Расстояние между сообщениями */
        }

        /* Стиль каждого сообщения */
        .chat-line {
            background: var(--msg-bg);
            backdrop-filter: blur(8px); /* Эффект матового стекла */
            -webkit-backdrop-filter: blur(8px);
            border-left: 4px solid var(--accent-color); /* Цветная полоска слева */
            border-radius: 0 12px 12px 0;
            padding: 10px 14px;
            color: var(--text-color);
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            
            /* Анимация появления */
            opacity: 0;
            transform: translateX(-20px);
            animation: slideIn var(--anim-speed) forwards;
            
            /* Чтобы длинные слова не ломали верстку */
            word-wrap: break-word; 
            max-width: 90%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Стиль имени пользователя */
        .username {
            font-weight: 800;
            margin-right: 6px;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        /* Двоеточие после ника */
        .colon {
            margin-right: 4px;
            opacity: 0.7;
        }

        /* Сообщение */
        .message {
            font-weight: 400;
            line-height: 1.4;
        }

        /* Анимация удаления старых сообщений (если нужно) */
        .fade-out {
            animation: fadeOut 0.5s forwards;
        }

        @keyframes slideIn {
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }
        
        /* Блок для смайликов */
        .chat-line img {
            vertical-align: middle;
            max-height: 28px;
        }
    </style>
</head>
<body>

    <div id="chat_container"></div>

    <script>
        // КОНФИГУРАЦИЯ
        const channelName = "QUDDIX"; 
        const maxMessages = 15; // Сколько сообщений хранить на экране
        const hideAfter = 20000; // Через сколько мс скрывать сообщение (0 = никогда)

        const chatContainer = document.getElementById('chat_container');

        // Подключаемся к Twitch
        ComfyJS.Init(channelName);

        // Когда приходит сообщение
        ComfyJS.onChat = (user, message, flags, self, extra) => {
            addMessage(user, message, extra.userColor, extra.messageEmotes);
        };

        // Функция добавления сообщения в HTML
        function addMessage(user, text, color, emotes) {
            const div = document.createElement('div');
            div.classList.add('chat-line');

            // Если цвета нет (дефолтный юзер), ставим наш акцентный
            const userColor = color || '#a970ff';

            // Обработка смайликов (простая замена)
            let formattedMessage = text;
            if (emotes) {
                // ComfyJS не парсит смайлы в HTML сам по себе, 
                // но для простоты мы оставим текст. 
                // Для полноценных картинок нужен сложный парсер, 
                // но этот код работает быстро и надежно.
            }

            // Формируем HTML внутри блока
            div.innerHTML = `
                <span class="username" style="color: ${userColor}">${user}</span><span class="colon">:</span>
                <span class="message">${formattedMessage}</span>
            `;

            chatContainer.appendChild(div);

            // Удаляем старые сообщения, если их слишком много
            if (chatContainer.children.length > maxMessages) {
                chatContainer.removeChild(chatContainer.children[0]);
            }

            // Авто-скрытие через время (если включено)
            if (hideAfter > 0) {
                setTimeout(() => {
                    div.classList.add('fade-out');
                    div.addEventListener('animationend', () => {
                        div.remove();
                    });
                }, hideAfter);
            }
        }

        // Тестовое сообщение при запуске (видит только стример)
        addMessage("System", "Чат подключен к каналу " + channelName + "! Удачного стрима!", "#00FF00");
    </script>
</body>
</html>
